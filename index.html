</head>
<body>

    <p class="bio">"Front-end developer and avid reader."</p>
    
    <div class="buttons">

      <a class="btn" href="https://www.frontendmentor.io" alt="Frontend Mentor">Frontend Mentor</a>
      <a class="btn" href="https://www.linkedin.com" alt="LinkedIn">LinkedIn</a>
      <a class="btn" href="https://www.x.com" alt="X formally know as X">Twitter</a>
      <a class="btn" href="https://www.instagram.com" alt="Instagram">Instagram</a>
    </div>
  </div>
<footer class="attribution">
